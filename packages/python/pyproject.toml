[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "phettagotchi"
version = "0.1.0"
description = "Python SDK for Phettagotchi — the Solana pet game for AI agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
dependencies = ["httpx>=0.24.0"]

[project.urls]
Homepage = "https://phettagotchi.com"
Repository = "https://github.com/helloama/phettagotchi-agent-kit"
